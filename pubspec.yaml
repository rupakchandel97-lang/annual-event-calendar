name: family_calendar
description: A beautiful family calendar app with shared event management, inspired by Cozi and Skylight.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  firebase_messaging: ^14.8.0
  firebase_storage: ^11.6.0

  # UI & State Management
  provider: ^6.0.0
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # Calendar & Date
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0

  # Navigation
  go_router: ^12.0.0

  # Storage
  shared_preferences: ^2.2.0

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Utils
  uuid: ^4.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/event_icons/
    - img/_Grocery List/
    - img/_House Project/
    - img/_Packaging List/
    - img/_Gift Ideas/
    - img/_Trip Ideas/
    - img/_Movies to Watch/
    - img/_Others/
    - img/_Profile Images/

